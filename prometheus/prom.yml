global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'whatsapp-system'

scrape_configs:

  - job_name: 'django'
    metrics_path: /metrics/
    static_configs:
      - targets: ['https://jeffer.chatia.solutions/metrics']


  - job_name: 'postgres'
    metrics_path: /metrics/
    static_configs:
      - targets: ['postgres-metrics-collector-production-2517.up.railway.app/metrics']
