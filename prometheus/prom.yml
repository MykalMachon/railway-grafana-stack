global:
  scrape_interval: 15s # Default scrape interval

scrape_configs:
  - job_name: "vertitrack"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["vertitrack.railway.internal:3000"]
    metrics_path: "/api/metrics"

